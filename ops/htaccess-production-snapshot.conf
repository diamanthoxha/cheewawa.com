RewriteRule ^(wp-content|wp-includes|wp-admin|wp-json)(/.*)?$ - [R=410,L]
RewriteRule ^(xmlrpc\.php|wp-login\.php)$ - [R=410,L]
RewriteRule ^wp-sitemap.*\.xml$ /sitemap.xml [R=301,L]

# --- canonical trailing-slash: /foo/ -> /foo (real dirs and ACME excluded) ---
RewriteCond %{REQUEST_FILENAME} !-d
RewriteCond %{REQUEST_URI} !^/\.well-known/
RewriteRule ^(.+)/$ /$1 [R=301,L]
# ---------- END Astro-era legacy redirects ----------

# ChiLove PHP front controller
# If a local file or dir exists in public_html, Apache serves it directly
RewriteCond %{REQUEST_FILENAME} -f [OR]
RewriteCond %{REQUEST_FILENAME} -d
RewriteRule ^ - [L]

# Otherwise route to ChiLove (PHP)
RewriteRule ^ index.php [L]

# ─── Cache headers for LOCAL files ───────────────────────────────────
<IfModule mod_headers.c>
  # _astro/ bundles are content-hashed → immutable, 1 year
  <If "%{REQUEST_URI} =~ m#^/_astro/#">
    Header set Cache-Control "public, max-age=31536000, immutable"
  </If>
  # Fonts → immutable too
  <FilesMatch "\.(?i:woff2?|ttf|otf|eot)$">
    Header set Cache-Control "public, max-age=31536000, immutable"
  </FilesMatch>
  # Images / icons → 30 days
  <FilesMatch "\.(?i:jpe?g|png|gif|webp|avif|svg|ico)$">
    Header set Cache-Control "public, max-age=2592000"
  </FilesMatch>
  # Non-/_astro CSS/JS → 30 days
  <FilesMatch "\.(?i:css|js|mjs)$">
    Header set Cache-Control "public, max-age=2592000"
  </FilesMatch>
  # Crawler/meta files → short, fresh
  <FilesMatch "^(ads\.txt|robots\.txt|sitemap\.xml|rss\.xml|favicon\..*)$">
    Header set Cache-Control "public, max-age=3600"
  </FilesMatch>

  Header always set X-Content-Type-Options "nosniff"
  Header always set Referrer-Policy "strict-origin-when-cross-origin"
  # ---------- BEGIN security headers (sec-20260720) ----------
  # HSTS: no includeSubDomains (mail/webmail subdomains may lack certs) and no
  # preload (hard to reverse). Sent unconditionally: CF may talk HTTP to origin,
  # and browsers ignore HSTS received over plain HTTP anyway.
  Header always set Strict-Transport-Security "max-age=15552000"
  Header always set X-Frame-Options "SAMEORIGIN"
  Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
  # ---------- END security headers (sec-20260720) ----------
  # ---------- BEGIN noindex for weakest news/satirical pieces (pass 3, 2026-06-09) ----------
  # Default-(c) per pass-2 audit: keep the bulk of /news/ indexed (verified 967-1217
  # words with explicit owner-takeaway sections); noindex only the weakest one.
  # Article lives at /stories/van-damme-saved-chihuahua-norway-border (user-audit
  # called it /news/van-damme-* — wrong category). Header applies to that URL only,
  # follow=allow so link equity passes through without Google indexing the page.
  <If "%{REQUEST_URI} =~ m#^/stories/van-damme-saved-chihuahua-norway-border/?$#">
    Header always set X-Robots-Tag "noindex, follow"
  </If>
  # ---------- END noindex ----------

</IfModule>

# BEGIN perf: long-lived caching for versioned static assets (perf-20260715)
# CSS/JS carry ?v= filemtime cache-busters and images are content-stable
# (replaced photos must get a new filename), so a 1-year immutable TTL is safe.
<IfModule mod_headers.c>
  <FilesMatch "\.(css|js|mjs|webp|jpe?g|png|gif|svg|ico|woff2?)$">
    Header set Cache-Control "public, max-age=31536000, immutable"
  </FilesMatch>
</IfModule>
# END perf: long-lived caching (perf-20260715)
